<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
  :root{--bg:#0c120f;--panel:#141d18;--panel2:#1a2620;--border:#2b3a33;--text:#e9efe6;--muted:#92a89c;--zonai:#49d6c2;--zonai-dim:#2c8f82;--gold:#e2b357;}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  #app{display:flex;height:100vh;overflow:hidden}
  #side{width:344px;min-width:344px;background:linear-gradient(180deg,var(--panel2),var(--panel));border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:6px 0 24px rgba(0,0,0,.35);position:relative;z-index:2}
  .top{padding:12px 16px;border-bottom:1px solid var(--border)}
  .hl{font-size:12px;letter-spacing:.04em} .hl a{color:var(--zonai);text-decoration:none;font-weight:600;opacity:.85} .hl a:hover{opacity:1}
  .layers{display:flex;gap:6px;margin-top:11px;background:#0d1410;border:1px solid var(--border);border-radius:10px;padding:4px}
  .layers button{flex:1;background:transparent;border:0;color:var(--muted);border-radius:7px;padding:8px;cursor:pointer;font-size:12.5px;font-weight:600;letter-spacing:.02em;transition:background .12s,color .12s}
  .layers button.on{background:linear-gradient(180deg,rgba(73,214,194,.22),rgba(73,214,194,.1));color:var(--zonai);box-shadow:inset 0 0 0 1px rgba(73,214,194,.35)}
  .sect{padding:13px 16px;border-bottom:1px solid var(--border)}
  .big{font-family:'Cinzel',serif;font-size:27px;font-weight:700;color:var(--text);line-height:1} .big span{color:var(--muted);font-size:13px;font-weight:400;font-family:'Hanken Grotesk',sans-serif}
  .bar{height:8px;border-radius:5px;background:#0d1410;overflow:hidden;margin-top:9px;box-shadow:inset 0 1px 2px rgba(0,0,0,.4)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--zonai-dim),var(--zonai));width:0;box-shadow:0 0 12px rgba(73,214,194,.55);transition:width .3s}
  .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:4px;background:#0d1410}
  .seg button{flex:1;background:transparent;border:0;color:var(--muted);padding:7px;font-size:12px;cursor:pointer;font-weight:500}
  .seg button.on{background:linear-gradient(180deg,rgba(73,214,194,.2),rgba(73,214,194,.08));color:var(--zonai)}
  .btns{display:flex;gap:8px} .mini{background:#0d1410;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;transition:border-color .12s}
  .mini:hover{border-color:var(--zonai-dim);color:var(--zonai)}
  #legend{flex:1;overflow:auto}
  #legend::-webkit-scrollbar{width:9px} #legend::-webkit-scrollbar-thumb{background:#243029;border-radius:5px;border:2px solid var(--panel)}
  .leg{display:flex;align-items:center;gap:9px;padding:6px 16px;cursor:pointer;font-size:12.5px;user-select:none;transition:background .1s}
  .leg:hover{background:rgba(73,214,194,.06)} .leg.off{opacity:.38}
  .leg .ic{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 0 10px -3px var(--c, transparent)}
  .leg .ic img{width:15px;height:15px} .leg .n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .leg .ct{color:var(--muted);font-variant-numeric:tabular-nums;font-size:11px;font-weight:600}
  #search{width:100%;padding:8px 11px;background:#0d1410;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit}
  #search:focus{outline:none;border-color:var(--zonai-dim)}
  .btn{background:#0d1410;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 11px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:border-color .12s,background .12s}
  .btn.primary{background:linear-gradient(180deg,#3bbfae,#2c8f82);border-color:#3bbfae;color:#04120f;box-shadow:0 0 16px -4px rgba(73,214,194,.6)} .btn.primary:hover{background:linear-gradient(180deg,#49d6c2,#33a294)}
  .btn:hover{border-color:var(--zonai-dim)}
  .btn.gold{border-color:#5a4a26;color:var(--gold)} .btn.gold:hover{border-color:var(--gold);background:rgba(226,179,87,.08)}
  code#savePath{background:#0d1410;border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:#b9cabf;word-break:break-all;font-size:10px;flex:1;font-family:ui-monospace,monospace}
  .hint{font-size:10.5px;color:var(--muted);margin-top:7px;line-height:1.5}
  .safebar{font-size:10.5px;color:#bcd0c6;line-height:1.5;background:rgba(73,214,194,.06);border:1px solid var(--border);border-left:2px solid var(--zonai);border-radius:7px;padding:8px 10px;margin-top:9px}
  .safebar b{color:var(--gold)}
  #main{flex:1;position:relative;overflow:hidden;background:radial-gradient(900px 600px at 50% 40%,#0a130f,#05070a)}
  #vp{position:absolute;inset:0;cursor:grab;overflow:hidden} #vp.drag{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #mapimg{display:block;width:1500px;height:1500px}
  .pin{position:absolute;width:20px;height:20px;border-radius:50%;border:2px solid #0b1310;transform:translate(-50%,-50%);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.7)}
  .pin img{width:13px;height:13px;pointer-events:none} .pin.miss{filter:grayscale(.7) brightness(.72);opacity:.92}
  .pin.fnd{box-shadow:0 0 0 2px rgba(73,214,194,.5),0 1px 4px rgba(0,0,0,.7)}
  .pin.fnd::after{content:"";position:absolute;right:-3px;bottom:-3px;width:9px;height:9px;border-radius:50%;background:var(--zonai);border:1.5px solid #0b1310;box-shadow:0 0 7px rgba(73,214,194,.9)}
  .pin:hover{outline:2px solid #fff;z-index:6} .pin.hi{outline:3px solid var(--zonai);width:28px;height:28px;z-index:7;box-shadow:0 0 18px rgba(73,214,194,.8)}
  #zoomctl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px}
  #zoomctl button{width:36px;height:36px;font-size:19px;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);color:var(--text);border-radius:9px;cursor:pointer;transition:border-color .12s,color .12s}
  #zoomctl button:hover{border-color:var(--zonai-dim);color:var(--zonai)}
  #count2{position:absolute;left:14px;top:14px;background:rgba(16,24,20,.88);border:1px solid var(--border);border-radius:9px;padding:7px 12px;font-size:12px;font-weight:500;backdrop-filter:blur(6px)}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(4,9,7,.72);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;backdrop-filter:blur(3px)}
  .modal.show{display:flex}
  .sheet{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:16px;max-width:384px;width:100%;padding:22px;position:relative;border-top:4px solid var(--c);box-shadow:0 24px 60px rgba(0,0,0,.6)}
  .sheet .close{position:absolute;top:11px;right:14px;background:none;border:0;color:var(--muted);font-size:21px;cursor:pointer}
  .sheet .close:hover{color:var(--text)}
  .mh{display:flex;gap:14px;align-items:center}
  .mi{flex:none;width:58px;height:58px;border-radius:13px;background:radial-gradient(circle at 50% 34%,#2a3a33,#121a16);display:flex;align-items:center;justify-content:center;border:1px solid color-mix(in srgb,var(--c) 30%,var(--border))}
  .mi img{width:40px;height:40px}
  .mt{font-family:'Cinzel',serif;font-size:18px;font-weight:600} .ms{font-size:12px;color:var(--muted);margin-top:3px}
  .pill{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);font-weight:600}
  .pill.y{background:rgba(73,214,194,.12);border-color:var(--zonai-dim);color:var(--zonai)} .pill.n{color:var(--muted)}
  .mrow{margin-top:14px;font-size:13px;color:#cdd6e0} .mrow .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px}
  .wbtn{display:inline-block;margin-top:16px;background:linear-gradient(180deg,#3bbfae,#2c8f82);color:#04120f;text-decoration:none;padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600}
  .wbtn:hover{background:linear-gradient(180deg,#49d6c2,#33a294)}
  #menuBtn{display:none;position:absolute;left:12px;top:12px;z-index:12;align-items:center;gap:7px;background:rgba(16,24,20,.92);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:9px 13px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;backdrop-filter:blur(6px);box-shadow:0 4px 14px rgba(0,0,0,.4)}
  #backdrop{display:none;position:fixed;inset:0;background:rgba(4,9,7,.55);z-index:20;backdrop-filter:blur(2px)}
  #backdrop.show{display:block}
  @media(max-width:760px){
    #side{position:fixed;top:0;left:0;bottom:0;z-index:30;width:86%;max-width:340px;transform:translateX(-100%);transition:transform .26s ease}
    #side.open{transform:none}
    #menuBtn{display:inline-flex}
    #pathRowMap{display:none}
    #count2{top:auto;bottom:14px;left:14px}
  }
</style></head>
<body>
<div id="app">
  <div id="side">
    <div class="top">
      <div class="hl"><a href="../index.html">&larr; All trackers</a></div>
      <div style="font-family:'Cinzel',serif;font-size:17px;font-weight:600;margin-top:8px;letter-spacing:.02em">Map &amp; Collectibles</div>
      <div class="layers" id="layers"><button data-layer="s" class="on">Surface</button><button data-layer="k">Sky</button><button data-layer="d">Depths</button></div>
    </div>
    <div class="sect">

      <div class="bar"><i id="fill"></i></div>

    </div>
    <div class="sect">
      <div class="btns" style="margin-bottom:7px">
        <button class="btn primary" id="refreshBtn" style="flex:1">&#8635; Refresh</button>
        <button class="btn" id="chooseBtn">Folder…</button>
      </div>
      <div class="btns" id="pathRowMap"><code id="savePath">Select the folder that contains slot_00 … slot_05</code><button class="mini" id="copyPath">Copy</button></div>
      <input type="file" id="file" style="display:none"/>
      <div class="btns" style="margin-top:8px"><button class="btn gold" id="backupBtn" style="flex:1" disabled>&#128190; Back up saves to a folder</button></div>
      <div class="hint" id="fileHint"></div><div class="hint" id="age" style="font-weight:600"></div>
      <div class="safebar">Read-only &mdash; your save is never modified. <b>Tip:</b> point this at a <b>copy</b> of your slot folder, or use <b>Back up saves</b> first.</div>
    </div>
    <div class="sect" style="padding-bottom:8px">
      <div class="btns" style="justify-content:space-between"><span style="font-size:11px;color:var(--muted);align-self:center">CATEGORIES</span>
        <span><button class="mini" id="allOn">All</button> <button class="mini" id="allOff">None</button></span></div>
      <input id="search" placeholder="Search..." style="margin-top:8px"/>
    </div>
    <div id="legend"></div>
  </div>
  <div id="main">
    <button id="menuBtn">&#9776; Filters</button>
    <div id="vp"><div id="world"><img id="mapimg" src="surface.png" draggable="false"/></div></div>
    <div id="count2"></div>
    <div id="zoomctl"><button id="zin">+</button><button id="zout">&minus;</button><button id="zfit">&#9678;</button></div>
  </div>
  <div id="backdrop"></div>
</div>
<div class="modal" id="modal"><div class="sheet" id="sheet">
  <button class="close" id="mClose">&times;</button>
  <div class="mh"><div class="mi"><img id="mImg" alt=""></div><div><div class="mt" id="mTitle"></div><div class="ms" id="mSub"></div></div></div>
  <div id="mOwn"></div>
  <div class="mrow"><div class="k">Layer</div><span id="mLayer"></span></div>
  <a class="wbtn" id="mWiki" target="_blank" rel="noopener">Open Zelda Wiki ↗</a>
</div></div>

const MAP_SIZE=1500, WORLD=12000;
const CAT={}; DATA.cats.forEach(c=>CAT[c.k]=c);
const LAYIMG={s:'surface.png',k:'sky.png',d:'depths.png'};
const LAYNAME={s:'Surface',k:'Sky',d:'Depths'};
const WB='https://zelda.fandom.com/wiki/';
let layer='s', ownFilter='missing', q='';
let enabled=new Set(['shrines','hidden_koroks','carry_koroks','lightroots']);
const world=document.getElementById('world'), vp=document.getElementById('vp');
function worldToPx(x,z){return [x*(MAP_SIZE/WORLD)+MAP_SIZE/2,-z*(MAP_SIZE/WORLD)+MAP_SIZE/2];}
function passFilter(o){return ownFilter==='all'||(ownFilter==='found'?o.f:!o.f);}

function buildPins(){
  world.querySelectorAll('.pin').forEach(e=>e.remove());
  const frag=document.createDocumentFragment(); let n=0;
  for(const c of DATA.cats){
    if(!enabled.has(c.k))continue;
    const arr=DATA.objs[c.k];
    for(let i=0;i<arr.length;i++){const o=arr[i];
      if(o.L!==layer||!passFilter(o))continue;
      if(q && !o.n.toLowerCase().includes(q))continue;
      const [px,py]=worldToPx(o.x,o.z);
      const el=document.createElement('div'); el.className='pin '+(o.f?'fnd':'miss');
      el.style.left=px+'px';el.style.top=py+'px';el.style.background=c.c;
      el.dataset.k=c.k; el.dataset.i=i;
      const img=document.createElement('img'); img.src='icons/'+c.ic+'.png'; el.appendChild(img);
      frag.appendChild(el); n++;
    }
  }
  world.appendChild(frag);
  document.getElementById('count2').textContent=n+' shown · '+LAYNAME[layer];
}
function counts(){const m={};let F=0,T=0;for(const c of DATA.cats){const a=DATA.objs[c.k];const f=a.filter(o=>o.f).length;m[c.k]=[f,a.length];F+=f;T+=a.length;}return {m,F,T};}
function renderHeader(){const {F,T}=counts();document.getElementById('foundN').textContent=F;
  document.getElementById('totLbl').textContent=' / '+T+' found';document.getElementById('fill').style.width=(F/T*100)+'%';}
function renderLegend(){const {m}=counts();const L=document.getElementById('legend');L.innerHTML='';
  for(const c of DATA.cats){const row=document.createElement('div');row.className='leg'+(enabled.has(c.k)?'':' off');
    row.innerHTML='<span class="ic" style="background:'+c.c+'"><img src="icons/'+c.ic+'.png"></span><span class="n">'+c.l+'</span><span class="ct">'+m[c.k][0]+'/'+m[c.k][1]+'</span>';
    row.onclick=()=>{enabled.has(c.k)?enabled.delete(c.k):enabled.add(c.k);renderLegend();buildPins();};
    L.appendChild(row);}}
function refreshAll(){renderHeader();renderLegend();buildPins();}

// layer + filter
document.getElementById('layers').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  layer=b.dataset.layer;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  document.getElementById('mapimg').src=LAYIMG[layer];buildPins();});
document.getElementById('ownSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  ownFilter=b.dataset.v;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));buildPins();});
document.getElementById('allOn').onclick=()=>{DATA.cats.forEach(c=>enabled.add(c.k));renderLegend();buildPins();};
document.getElementById('allOff').onclick=()=>{enabled.clear();renderLegend();buildPins();};
document.getElementById('search').addEventListener('input',e=>{q=e.target.value.toLowerCase().trim();buildPins();});

// pan/zoom
let scale=0.45,tx=0,ty=0;
function clamp(){const w=MAP_SIZE*scale,W=vp.clientWidth,H=vp.clientHeight,m=200;tx=Math.min(m,Math.max(W-w-m,tx));ty=Math.min(m,Math.max(H-w-m,ty));}
function apply(){clamp();world.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
function fit(){scale=Math.min(vp.clientWidth,vp.clientHeight)/MAP_SIZE*0.95;tx=(vp.clientWidth-MAP_SIZE*scale)/2;ty=(vp.clientHeight-MAP_SIZE*scale)/2;apply();}
function zoomAt(cx,cy,fc){const ns=Math.min(5,Math.max(0.2,scale*fc));tx=cx-(cx-tx)*(ns/scale);ty=cy-(cy-ty)*(ns/scale);scale=ns;apply();}
vp.addEventListener('wheel',e=>{e.preventDefault();const r=vp.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);},{passive:false});
let dragging=false,sx,sy,moved=false;
vp.addEventListener('pointerdown',e=>{dragging=true;moved=false;vp.classList.add('drag');sx=e.clientX-tx;sy=e.clientY-ty;vp.setPointerCapture(e.pointerId);});
vp.addEventListener('pointermove',e=>{if(dragging){tx=e.clientX-sx;ty=e.clientY-sy;moved=true;apply();}});
vp.addEventListener('pointerup',()=>{dragging=false;vp.classList.remove('drag');});
document.getElementById('zin').onclick=()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1.3);
document.getElementById('zout').onclick=()=>zoomAt(vp.clientWidth/2,vp.clientHeight/2,1/1.3);
document.getElementById('zfit').onclick=fit;

// pin detail modal
const modal=document.getElementById('modal'),sheet=document.getElementById('sheet');
function openObj(k,i){const c=CAT[k],o=DATA.objs[k][i];sheet.style.setProperty('--c',c.c);
  document.getElementById('mImg').src='icons/'+c.ic+'.png';
  document.getElementById('mTitle').textContent=o.n;
  document.getElementById('mSub').textContent=c.l;
  document.getElementById('mOwn').innerHTML=o.f?'<span class="pill y">✓ Found / done</span>':'<span class="pill n">Not yet found</span>';
  document.getElementById('mLayer').textContent=LAYNAME[o.L];
  const wikiName = c.w==='name' ? o.n : c.w;
  document.getElementById('mWiki').href=WB+encodeURIComponent(wikiName.replace(/ /g,'_'));
  modal.classList.add('show');}
world.addEventListener('click',e=>{if(moved)return;const p=e.target.closest('.pin');if(p)openObj(p.dataset.k,+p.dataset.i);});
document.getElementById('mClose').onclick=()=>modal.classList.remove('show');
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')modal.classList.remove('show');});

const fileInput=document.getElementById('file'),fileHint=document.getElementById('fileHint');
const supportsFS=('showDirectoryPicker' in window); let dirHandle=null, loadedMtime=null;
function fmtAge(ms){var s=Math.max(0,Math.floor((Date.now()-ms)/1000));if(s<60)return s+' sec old';var m=Math.floor(s/60);if(m<60)return m+' min old';return Math.floor(m/60)+'h '+(m%60)+'m old';}
function renderAge(){const el=document.getElementById('age');if(loadedMtime==null){el.textContent='';return;}const min=(Date.now()-loadedMtime)/60000;el.style.color=min<2?'#3fb950':(min<30?'#8b949e':'#e3b341');el.textContent=(min<2?'✓ Fresh — ':'Save ')+fmtAge(loadedMtime);}
function parseSave(buf){const dv=new DataView(buf);
  if(dv.getUint32(0,true)!==0x01020304)throw new Error('Not a valid TotK progress.sav.');
  const flags=new Map();let go=null;const n=dv.byteLength;
  for(let off=0x28;off+8<=n;off+=8){const h=dv.getUint32(off,true);if(h===0xa3db7114){go=dv.getUint32(off+4,true);break;}flags.set(h,dv.getUint32(off+4,true));}
  const guids=new Set();
  if(go!=null){for(let o=go;o+8<=n;o+=8){const lo=BigInt(dv.getUint32(o,true)),hi=BigInt(dv.getUint32(o+4,true));if(lo===0n&&hi===0n)break;guids.add(((hi<<32n)|lo).toString());}}
  return {flags,guids};}
function applySave(s){for(const c of DATA.cats){const r=c.r;for(const o of DATA.objs[c.k]){
  if(r==='guid')o.f=s.guids.has(o.g);else{const v=s.flags.get(o.h)||0;o.f=r==='clear'?v===1654019904:(r==='open'?v===404286466:v!==0);}}}refreshAll();}
function score(s){let n=0;for(const c of DATA.cats){const r=c.r;for(const o of DATA.objs[c.k]){if(r==='guid'){if(s.guids.has(o.g))n++;}else{const v=s.flags.get(o.h)||0;if(r==='clear'?v===1654019904:(r==='open'?v===404286466:v!==0))n++;}}}return n;}
async function findSaves(dir,name,out,d){if(d>8)return;for await(const[nm,h]of dir.entries()){if(h.kind==='file'&&nm.toLowerCase()==='progress.sav'){try{const fl=await h.getFile();out.push({slot:name||nm,file:fl,mtime:fl.lastModified});}catch(e){}}else if(h.kind==='directory'){await findSaves(h,nm,out,d+1);}}}
async function ensurePerm(h){let p=await h.queryPermission({mode:'read'});if(p!=='granted')p=await h.requestPermission({mode:'read'});return p==='granted';}
async function loadNewest(){if(!dirHandle)return;if(!await ensurePerm(dirHandle)){alert('Permission denied.');return;}
  const out=[];await findSaves(dirHandle,dirHandle.name,out,0);
  if(!out.length){alert('No progress.sav found. Pick the folder with slot_00…slot_05.');return;}
  for(const o of out){try{o.s=parseSave(await o.file.arrayBuffer());o.sc=score(o.s);}catch(e){o.s=null;o.sc=-1;}}
  out.sort((a,b)=>(b.mtime-a.mtime)||(b.sc-a.sc));const best=out[0];if(!best.s){alert('Could not read save.');return;}
  applySave(best.s);loadedMtime=best.mtime;renderAge();fileHint.textContent='Loaded '+best.slot+' · '+best.sc+' found · '+new Date().toLocaleTimeString();document.getElementById('backupBtn').disabled=false;}
async function connectFolder(){if(supportsFS){try{dirHandle=await window.showDirectoryPicker({mode:'read',startIn:dirHandle||undefined});saveHandle(dirHandle);document.getElementById('chooseBtn').textContent='Change…';document.getElementById('backupBtn').disabled=false;await loadNewest();}catch(e){if(e.name!=='AbortError')alert(e.message);}}else{fileInput.click();}}
async function doRefresh(){if(dirHandle){try{await loadNewest();}catch(e){alert('Could not reload: '+e.message);}}else if(supportsFS){connectFolder();}else{fileInput.click();}}
fileInput.addEventListener('change',e=>{const fl=e.target.files[0];if(!fl)return;const rd=new FileReader();rd.onload=()=>{try{applySave(parseSave(rd.result));loadedMtime=fl.lastModified;renderAge();fileHint.textContent='Loaded '+fl.name;}catch(err){alert(err.message);}};rd.readAsArrayBuffer(fl);});
document.getElementById('chooseBtn').onclick=connectFolder;
document.getElementById('refreshBtn').onclick=doRefresh;
// ---- back up saves to a folder the user picks (never writes to the live save) ----
async function backupSaves(){
  if(!supportsFS){alert('Your browser cannot write a backup folder. Copy your slot_00…slot_05 folder manually in your file explorer.');return;}
  if(!dirHandle){alert('Connect your save folder first (hit Refresh).');return;}
  if(!await ensurePerm(dirHandle)){alert('Permission denied.');return;}
  const out=[];await findSaves(dirHandle,dirHandle.name,out,0);
  if(!out.length){alert('No progress.sav files found to back up.');return;}
  let dest;try{dest=await window.showDirectoryPicker({mode:'readwrite'});}catch(e){if(e.name==='AbortError')return;alert(e.message);return;}
  try{if(await dest.isSameEntry(dirHandle)){alert('Choose a DIFFERENT folder from your live save — backups should live somewhere else.');return;}}catch(e){}
  const bb=document.getElementById('backupBtn');const orig=bb.innerHTML;bb.disabled=true;bb.textContent='Backing up…';
  try{
    const stamp=new Date().toISOString().slice(0,16).replace(/[:T]/g,'-');
    const root=await dest.getDirectoryHandle('totk-save-backup-'+stamp,{create:true});
    let n=0;
    for(const o of out){const sub=await root.getDirectoryHandle(o.slot||('slot_'+n),{create:true});
      const fh=await sub.getFileHandle('progress.sav',{create:true});const w=await fh.createWritable();
      await w.write(await o.file.arrayBuffer());await w.close();n++;}
    bb.textContent='✓ Backed up '+n+' save'+(n>1?'s':'');
    fileHint.textContent='Backup saved to “totk-save-backup-'+stamp+'” ('+n+' file'+(n>1?'s':'')+'). Your original is untouched.';
    setTimeout(()=>{bb.innerHTML=orig;bb.disabled=false;},3000);
  }catch(e){alert('Backup failed: '+e.message);bb.innerHTML=orig;bb.disabled=false;}
}
document.getElementById('backupBtn').onclick=backupSaves;
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('totk-map',1);r.onupgradeneeded=()=>r.result.createObjectStore('h');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function saveHandle(h){try{const db=await idb();db.transaction('h','readwrite').objectStore('h').put(h,'dir');}catch(e){}}
async function loadHandle(){try{const db=await idb();return await new Promise(res=>{const rq=db.transaction('h').objectStore('h').get('dir');rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>res(null);});}catch(e){return null;}}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy')}catch(e){}ta.remove();}
document.getElementById('copyPath').onclick=()=>{const t=document.getElementById('savePath').textContent;try{navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t));}catch(e){fallbackCopy(t);}const b=document.getElementById('copyPath');b.textContent='✓';setTimeout(()=>b.textContent='Copy',1200);};

// init
refreshAll();setInterval(renderAge,15000);
// mobile drawer toggle
(function(){var side=document.getElementById('side'),bd=document.getElementById('backdrop'),mb=document.getElementById('menuBtn');
  function close(){side.classList.remove('open');bd.classList.remove('show');}
  if(mb)mb.onclick=function(){var o=side.classList.toggle('open');bd.classList.toggle('show',o);};
  if(bd)bd.onclick=close;})();
const mi=document.getElementById('mapimg');if(mi.complete)fit();else mi.onload=fit;
window.addEventListener('resize',apply);
if(supportsFS){fileHint.textContent='Refresh: first time pick your save folder (paste path above), then it auto-loads. Keep this tab open.';
  loadHandle().then(async h=>{if(h){dirHandle=h;document.getElementById('chooseBtn').textContent='Change…';
    try{if((await dirHandle.queryPermission({mode:'read'}))==='granted'){document.getElementById('backupBtn').disabled=false;await loadNewest();}else{fileHint.textContent='Save folder remembered — click Refresh to load your latest.';}}catch(e){}}});
}else{fileHint.textContent='On this device, tap Refresh and pick your synced progress.sav (e.g. from OneDrive, Google Drive or Files).';document.getElementById('backupBtn').style.display='none';}
</script>
